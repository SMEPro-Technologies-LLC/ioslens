name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install lint dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check src/ioslens
      - name: Ruff format check
        run: ruff format --check src/ioslens

  lint-node:
    name: Lint Node/TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/sdk/node/package.json
      - name: Install dependencies
        working-directory: src/sdk/node
        run: npm ci
      - name: TypeScript check
        working-directory: src/sdk/node
        run: npx tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt -r src/requirements-dev.txt
      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest tests/unit \
            --cov=ioslens \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          DATABASE_URL: postgresql://fake/fake

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ioslens
          POSTGRES_PASSWORD: ioslens_test
          POSTGRES_DB: ioslens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r src/requirements.txt -r src/requirements-dev.txt
      - name: Run migrations
        run: |
          for f in database/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
        env:
          DATABASE_URL: ******localhost:5432/ioslens_test
      - name: Run integration tests
        run: |
          PYTHONPATH=src pytest tests/integration \
            -v \
            --timeout=60
        env:
          DATABASE_URL: ******localhost:5432/ioslens_test
          JWT_SECRET: ci-test-secret
          REDIS_URL: redis://localhost:6379/0
          TEST_DATABASE_URL: ******localhost:5432/ioslens_test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ioslens:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
