name: CD — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: gcr.io/${{ secrets.GCP_PROJECT_ID }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: staging-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        id: validate-secrets
        # GitHub Actions renders both unset secrets and secrets set to an empty
        # string as an empty environment variable, so -z correctly catches both
        # cases. Any secret that evaluates to "" here must be configured before
        # google-github-actions/auth can authenticate successfully.
        run: |
          missing=()
          [ -z "$GCP_PROJECT_ID" ]          && missing+=("GCP_PROJECT_ID")
          [ -z "$GCP_CREDENTIALS_STAGING" ] && missing+=("GCP_CREDENTIALS_STAGING")
          [ -z "$GCP_REGION" ]              && missing+=("GCP_REGION")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::notice::Skipping deployment — the following secrets are not yet configured: ${missing[*]}"
            echo "Configure them under Settings → Secrets and variables → Actions (or the 'staging' environment)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_STAGING: ${{ secrets.GCP_CREDENTIALS_STAGING }}
          GCP_REGION: ${{ secrets.GCP_REGION }}

      - name: Authenticate to GCP
        if: steps.validate-secrets.outputs.configured == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_STAGING }}

      - name: Set up Cloud SDK
        if: steps.validate-secrets.outputs.configured == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        if: steps.validate-secrets.outputs.configured == 'true'
        run: gcloud auth configure-docker gcr.io

      - name: Build and push API image
        if: steps.validate-secrets.outputs.configured == 'true'
        run: |
          docker build -t $REGISTRY/ioslens/api:$IMAGE_TAG -f Dockerfile --target api .
          docker push $REGISTRY/ioslens/api:$IMAGE_TAG

      - name: Build and push MCP image
        if: steps.validate-secrets.outputs.configured == 'true'
        run: |
          docker build -t $REGISTRY/ioslens/mcp:$IMAGE_TAG -f Dockerfile --target mcp .
          docker push $REGISTRY/ioslens/mcp:$IMAGE_TAG

      - name: Get GKE credentials
        if: steps.validate-secrets.outputs.configured == 'true'
        run: |
          gcloud container clusters get-credentials ioslens-staging \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to staging
        if: steps.validate-secrets.outputs.configured == 'true'
        env:
          ENVIRONMENT: staging
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: gcr.io/${{ secrets.GCP_PROJECT_ID }}
        run: bash infra/scripts/deploy.sh

      - name: Run smoke tests
        if: steps.validate-secrets.outputs.configured == 'true'
        run: |
          sleep 15
          curl -f https://api.staging.ioslens.ai/health || exit 1
          echo "Staging smoke test passed"
