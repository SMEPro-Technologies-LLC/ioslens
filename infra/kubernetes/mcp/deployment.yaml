apiVersion: apps/v1
kind: Deployment
metadata:
  name: ioslens-mcp
  namespace: ioslens
  labels:
    app: ioslens-mcp
    app.kubernetes.io/name: ioslens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ioslens-mcp
  template:
    metadata:
      labels:
        app: ioslens-mcp
    spec:
      containers:
        - name: mcp
          image: ghcr.io/smepro-technologies-llc/ioslens:latest
          command: ["python", "-m", "ioslens.mcp.server"]
          ports:
            - containerPort: 8001
              name: mcp
          envFrom:
            - configMapRef:
                name: ioslens-config
            - secretRef:
                name: ioslens-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ioslens-mcp
  namespace: ioslens
  labels:
    app: ioslens-mcp
spec:
  selector:
    app: ioslens-mcp
  ports:
    - port: 80
      targetPort: 8001
  type: ClusterIP
