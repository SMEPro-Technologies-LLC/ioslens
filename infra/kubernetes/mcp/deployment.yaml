apiVersion: apps/v1
kind: Deployment
metadata:
  name: ioslens-mcp
  namespace: ioslens
  labels:
    app: ioslens-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ioslens-mcp
  template:
    metadata:
      labels:
        app: ioslens-mcp
    spec:
      containers:
        - name: mcp
          image: ioslens/mcp:latest
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ioslens-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ioslens-secrets
                  key: redis-url
            - name: MCP_PORT
              value: "8001"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ioslens-mcp
  namespace: ioslens
spec:
  selector:
    app: ioslens-mcp
  ports:
    - port: 8001
      targetPort: 8001
