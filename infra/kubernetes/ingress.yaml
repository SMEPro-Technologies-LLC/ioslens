apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ioslens-ingress
  namespace: ioslens
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.ioslens.ai
        - mcp.ioslens.ai
      secretName: ioslens-tls
  rules:
    - host: api.ioslens.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ioslens-api
                port:
                  number: 80
    - host: mcp.ioslens.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ioslens-mcp
                port:
                  number: 80
