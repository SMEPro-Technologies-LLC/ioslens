apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ioslens-ingress
  namespace: ioslens
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ioslens.ai
        - mcp.ioslens.ai
      secretName: ioslens-tls
  rules:
    - host: api.ioslens.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ioslens-api
                port:
                  number: 80
    - host: mcp.ioslens.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ioslens-mcp
                port:
                  number: 8001
