apiVersion: apps/v1
kind: Deployment
metadata:
  name: ioslens-api
  namespace: ioslens
  labels:
    app: ioslens-api
    app.kubernetes.io/name: ioslens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ioslens-api
  template:
    metadata:
      labels:
        app: ioslens-api
    spec:
      containers:
        - name: api
          image: ghcr.io/smepro-technologies-llc/ioslens:latest
          command: ["uvicorn", "ioslens.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ioslens-config
            - secretRef:
                name: ioslens-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ioslens-api
  namespace: ioslens
  labels:
    app: ioslens-api
spec:
  selector:
    app: ioslens-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ioslens-api-hpa
  namespace: ioslens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ioslens-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
