apiVersion: apps/v1
kind: Deployment
metadata:
  name: ioslens-api
  namespace: ioslens
  labels:
    app: ioslens-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ioslens-api
  template:
    metadata:
      labels:
        app: ioslens-api
    spec:
      containers:
        - name: api
          image: ioslens/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ioslens-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ioslens-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ioslens-secrets
                  key: jwt-secret
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: ioslens-config
                  key: environment
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ioslens-api
  namespace: ioslens
spec:
  selector:
    app: ioslens-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ioslens-api-hpa
  namespace: ioslens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ioslens-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
